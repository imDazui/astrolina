    <link rel="icon" type="image/svg+xml" href="/favicon/icon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, Slack, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AstroLina" />
    <meta property="og:url" content="https://maps.astrolina.org/" />
    <meta property="og:title" content="AstroLina Cartography" />
    <meta
      property="og:description"
      content="A modern, open-source astrocartography tool for curious minds. Plot a chart's planetary lines on an interactive world map, drag to relocate, and explore transits, progressions, and synastry. Computed with the Swiss Ephemeris, in your browser."
    />
    <meta property="og:image" content="https://maps.astrolina.org/images/astrolina-banner-v1.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta property="og:image:alt" content="AstroLina: an astrocartography world map with planetary lines" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AstroLina Cartography" />
    <meta
      name="twitter:description"
      content="A modern, open-source astrocartography tool for curious minds. Plot a chart's planetary lines on an interactive world map and explore transits, progressions, and synastry."
    />
    <meta name="twitter:image" content="https://maps.astrolina.org/images/astrolina-banner-v1.jpg" />
    <meta name="twitter:image:alt" content="AstroLina: an astrocartography world map with planetary lines" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://astrolina.org/#org",
            "name": "AstroLina",
            "url": "https://astrolina.org/",
            "logo": "https://astrolina.org/icon-512.png",
            "sameAs": ["https://git.astrolina.org/"]
          },
          {
            "@type": "WebSite",
            "@id": "https://maps.astrolina.org/#website",
            "url": "https://maps.astrolina.org/",
            "name": "AstroLina",
            "description": "A modern, open-source astrocartography tool for curious minds.",
            "inLanguage": "en",
            "publisher": { "@id": "https://astrolina.org/#org" }
          },
          {
            "@type": "SoftwareApplication",
            "@id": "https://maps.astrolina.org/#app",
            "name": "AstroLina",
            "applicationCategory": "LifestyleApplication",
            "operatingSystem": "Web",
            "url": "https://maps.astrolina.org/",
            "description": "A modern, open-source astrocartography tool for curious minds. Plot a chart's planetary lines on an interactive world map, drag to relocate, and explore transits, progressions, and synastry. Computed with the Swiss Ephemeris, in your browser.",
            "isAccessibleForFree": true,
            "license": "https://www.gnu.org/licenses/agpl-3.0.html",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
            "image": "https://maps.astrolina.org/images/astrolina-banner-v1.jpg",
            "screenshot": "https://maps.astrolina.org/images/astrolina-banner-v1.jpg",
            "publisher": { "@id": "https://astrolina.org/#org" }
          }
        ]
      }
    </script>
    <style>
      /* First-paint loading screen (replaced by the React app once the Swiss
         Ephemeris WASM + data finish loading). Inlined so it shows instantly. */
      html, body { background: #0b0e14; margin: 0; }
      #loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: radial-gradient(130% 120% at 50% 32%, #161c2b 0%, #0b0e14 58%);
        color: #cdd4e2;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        opacity: 1;
        transition: opacity 0.24s ease;
      }
      #loading-screen .ls-orb {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        border: 2px solid rgba(245, 184, 61, 0.85);
        box-shadow: 0 0 26px 2px rgba(245, 184, 61, 0.22),
          inset 0 0 14px rgba(245, 184, 61, 0.18);
        animation: ls-pulse 2.2s ease-in-out infinite;
      }
      #loading-screen .ls-title {
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: #eef1f6;
        padding-left: 0.34em;
      }
      #loading-screen .ls-track {
        width: 190px;
        height: 3px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }
      #loading-screen .ls-bar {
        height: 100%;
        width: 0;
        border-radius: 3px;
        background: linear-gradient(90deg, #f5b83d, #f3cd7a);
        transition: width 0.25s ease-out, background 0.2s;
      }
      #loading-screen .ls-status {
        font-size: 11.5px;
        letter-spacing: 0.02em;
        color: #7c8698;
        min-height: 15px;
        max-width: 280px;
        text-align: center;
        padding: 0 16px;
      }
      @keyframes ls-pulse {
        0%, 100% { transform: scale(0.9); opacity: 0.55; }
        50% { transform: scale(1.08); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #loading-screen .ls-orb { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading-screen">
        <div class="ls-orb"></div>
        <div class="ls-title">AstroLina</div>
        <div class="ls-track"><div class="ls-bar" id="ls-bar"></div></div>
        <div class="ls-status" id="ls-status">Loading…</div>
      </div>
    </div>
    <script>
      // Start the progress bar immediately at page load — so it moves while the
      // JS bundle (incl. the map engine) downloads, not just after it runs. The
      // bar eases asymptotically toward ~94%; main.tsx then drives the status
      // through real stages and snaps it to 100% when the engine is ready.
      (function () {
        var w = window;
        w.__load = { start: performance.now(), done: false, floor: 0 };
        var bar = document.getElementById('ls-bar');
        var st = document.getElementById('ls-status');
        var taken = false;
        w.__loadTaken = function () { taken = true; };
        setTimeout(function () {
          if (!taken && st) st.textContent = 'Loading map & engine…';
        }, 2500);
        function tick() {
          var L = w.__load;
          if (L.done) return;
          var t = performance.now() - L.start;
          var pct = Math.max(94 * (1 - Math.exp(-t / 3600)), L.floor);
          if (bar) bar.style.width = pct.toFixed(1) + '%';
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
